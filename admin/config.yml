backend:
  name: git-gateway
  branch: main

media_folder: "news-images"
public_folder: "news-images"

locale: ja

collections:
  - name: "news"
    label: "お知らせ"
    files:
      - name: "news_list"
        label: "お知らせ一覧"
        file: "news.json"
        fields:
          - label: "お知らせ"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "ID（英数字・ハイフンのみ）"
                name: "id"
                widget: "string"
                hint: "例: 2025-06-01-school-wear"
              - label: "日付"
                name: "date"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
              - label: "カテゴリー"
                name: "category"
                widget: "select"
                options: ["お知らせ", "セール", "新入荷", "イベント"]
                default: "お知らせ"
              - label: "タイトル（40文字程度）"
                name: "title"
                widget: "string"
              - label: "サムネイル写真"
                name: "image"
                widget: "image"
                required: false
              - label: "詳細内容"
                name: "body"
                widget: "text"
