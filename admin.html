<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ管理 ｜ マエナカスポーツ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f4f2; min-height: 100vh; }

    .header {
      background: #1a3d26; color: #fff;
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-weight: 900; font-size: 1rem; }
    .header-sub { font-size: 0.72rem; color: rgba(255,255,255,0.55); }
    .header-site-link { font-size: 0.75rem; color: rgba(255,255,255,0.7); text-decoration: none; }
    .header-site-link:hover { color: #fff; }

    .container { max-width: 680px; margin: 0 auto; padding: 28px 16px 60px; }

    /* トークン設定 */
    .token-setup {
      background: #fff3cd; border: 1.5px solid #ffc107;
      border-radius: 12px; padding: 20px 22px; margin-bottom: 24px;
    }
    .token-setup h3 { font-size: 0.88rem; font-weight: 900; color: #856404; margin-bottom: 8px; }
    .token-setup p { font-size: 0.78rem; color: #856404; margin-bottom: 12px; line-height: 1.6; }
    .token-row { display: flex; gap: 8px; }
    .token-row input {
      flex: 1; padding: 9px 12px; border: 1.5px solid #ffc107;
      border-radius: 7px; font-size: 0.82rem; background: #fffdf0;
    }
    .token-row input:focus { outline: none; border-color: #f0a500; }
    .btn-sm {
      padding: 9px 16px; background: #3a7b52; color: #fff;
      border: none; border-radius: 7px; font-size: 0.82rem;
      font-weight: 800; cursor: pointer; white-space: nowrap;
    }
    .btn-sm:hover { background: #2d6040; }
    .btn-sm.danger { background: #c0392b; }
    .btn-sm.danger:hover { background: #a93226; }
    .token-help { font-size: 0.72rem; color: #856404; margin-top: 8px; }
    .token-help a { color: #856404; }

    /* メインフォーム */
    .card {
      background: #fff; border-radius: 14px;
      padding: 28px 24px; border: 1px solid #e0e0e0;
      margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card-title {
      font-size: 1rem; font-weight: 900; color: #1a3d26;
      margin-bottom: 22px; display: flex; align-items: center; gap: 8px;
    }

    .form-row { margin-bottom: 18px; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 800; color: #333; margin-bottom: 6px; }
    .req { color: #e53; margin-left: 3px; }
    .form-hint { font-size: 0.72rem; color: #888; margin-top: 4px; }

    input[type="text"], input[type="date"], textarea, select {
      width: 100%; padding: 10px 14px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 0.88rem; color: #111;
      font-family: inherit; background: #fafafa;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="date"]:focus,
    textarea:focus, select:focus {
      outline: none; border-color: #3a7b52; background: #fff;
    }
    textarea { resize: vertical; min-height: 110px; line-height: 1.7; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 480px) { .row2 { grid-template-columns: 1fr; } }

    /* 画像アップロード */
    .img-upload-zone {
      border: 2px dashed #c8ddd0; border-radius: 10px;
      padding: 24px; text-align: center; cursor: pointer;
      background: #f8fbf9; transition: all 0.2s;
      position: relative;
    }
    .img-upload-zone:hover, .img-upload-zone.drag-over {
      border-color: #3a7b52; background: #f0f7f3;
    }
    .img-upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-text { font-size: 0.82rem; color: #666; }
    .upload-text strong { color: #3a7b52; }

    .img-preview {
      margin-top: 12px; display: none;
      border-radius: 8px; overflow: hidden; max-height: 160px;
    }
    .img-preview img { width: 100%; max-height: 160px; object-fit: cover; }
    .img-preview.show { display: block; }
    .img-remove {
      font-size: 0.75rem; color: #c0392b; cursor: pointer;
      text-align: right; margin-top: 4px; font-weight: 700;
    }

    /* 公開ボタン */
    .btn-publish {
      width: 100%; padding: 16px; background: #3a7b52; color: #fff;
      border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 900;
      cursor: pointer; letter-spacing: 0.06em; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-publish:hover:not(:disabled) { background: #2d6040; transform: translateY(-1px); }
    .btn-publish:disabled { background: #aaa; cursor: not-allowed; transform: none; }
    .btn-publish.loading { background: #1a3d26; }

    /* 記事一覧 */
    .news-list-card { background: #fff; border-radius: 14px; padding: 22px; border: 1px solid #e0e0e0; }
    .news-list-title { font-size: 0.88rem; font-weight: 900; color: #1a3d26; margin-bottom: 14px; }
    .news-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid #f0f0f0;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item-img {
      width: 44px; height: 44px; border-radius: 6px; object-fit: cover;
      background: #eee; flex-shrink: 0; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .news-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .news-item-body { flex: 1; min-width: 0; }
    .news-item-title { font-size: 0.83rem; font-weight: 800; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .news-item-meta { font-size: 0.7rem; color: #888; margin-top: 2px; }
    .news-item-del {
      font-size: 0.72rem; color: #c0392b; cursor: pointer;
      font-weight: 700; flex-shrink: 0; padding: 4px 8px;
      border: 1px solid #e8a8a8; border-radius: 5px;
    }
    .news-item-del:hover { background: #fdf0f0; }

    /* トースト通知 */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a3d26; color: #fff; padding: 12px 24px; border-radius: 24px;
      font-size: 0.88rem; font-weight: 800; opacity: 0; transition: all 0.3s;
      pointer-events: none; z-index: 1000; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: #c0392b; }

    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
      display: none;
    }
    .spinner.show { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      display: none; align-items: center; justify-content: center; z-index: 999;
    }
    .loading-overlay.show { display: flex; }
    .loading-box { background: #fff; border-radius: 12px; padding: 24px 32px; text-align: center; }
    .loading-box p { font-size: 0.88rem; color: #333; margin-top: 10px; font-weight: 700; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-logo">📰 お知らせ管理</div>
      <div class="header-sub">マエナカスポーツ スタッフ専用</div>
    </div>
  </div>
  <a href="https://maenakatsutomu-hash.github.io/maenaka-sports-hp/" target="_blank" class="header-site-link">サイトを見る →</a>
</div>

<div class="container">

  <!-- トークン設定 -->
  <div class="token-setup" id="tokenSetup">
    <h3>🔑 初回設定：GitHubトークンを入力</h3>
    <p>GitHubの「個人アクセストークン」を入力すると、このページから直接お知らせを公開できるようになります。一度入力すれば次回から不要です。</p>
    <div class="token-row">
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <button class="btn-sm" onclick="saveToken()">保存</button>
    </div>
    <div class="token-help">
      トークンの取得方法：<a href="https://github.com/settings/tokens/new?scopes=repo&description=maenaka-news" target="_blank">こちらをクリック</a>して「Generate token」→ コピーして上に貼り付け
    </div>
  </div>

  <!-- 投稿フォーム -->
  <div class="card">
    <div class="card-title">✏️ 新しいお知らせを作成</div>

    <div class="row2">
      <div class="form-row">
        <label class="form-label">日付 <span class="req">必須</span></label>
        <input type="date" id="f-date">
      </div>
      <div class="form-row">
        <label class="form-label">カテゴリ <span class="req">必須</span></label>
        <select id="f-category">
          <option value="お知らせ">お知らせ</option>
          <option value="セール">セール</option>
          <option value="新入荷">新入荷</option>
          <option value="イベント">イベント</option>
          <option value="休業日">休業日</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">タイトル <span class="req">必須</span></label>
      <input type="text" id="f-title" placeholder="例：夏のスポーツ用品セール開催中！">
    </div>

    <div class="form-row">
      <label class="form-label">サムネイル写真</label>
      <div class="img-upload-zone" id="uploadZone">
        <input type="file" id="f-image" accept="image/*" onchange="handleImageSelect(this)">
        <div class="upload-icon">📷</div>
        <div class="upload-text">クリックまたはドラッグ＆ドロップで写真を選ぶ<br><strong>JPG・PNG・WebP 対応</strong></div>
      </div>
      <div class="img-preview" id="imgPreview">
        <img id="imgPreviewEl" src="" alt="プレビュー">
      </div>
      <div class="img-remove" id="imgRemove" style="display:none" onclick="removeImage()">✕ 写真を削除</div>
    </div>

    <div class="form-row">
      <label class="form-label">本文 <span class="req">必須</span></label>
      <textarea id="f-body" placeholder="お知らせの内容を入力してください。"></textarea>
    </div>

    <button class="btn-publish" id="publishBtn" onclick="publish()">
      <span class="spinner" id="spinner"></span>
      🚀 公開する
    </button>
  </div>

  <!-- 投稿済み一覧 -->
  <div class="news-list-card">
    <div class="news-list-title">📋 掲載中のお知らせ</div>
    <div id="newsList"><div style="font-size:0.8rem;color:#aaa;text-align:center;padding:16px;">読み込み中...</div></div>
  </div>

</div>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div style="font-size:2rem;">⏳</div>
    <p id="loadingMsg">公開中...</p>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
const OWNER = 'maenakatsutomu-hash';
const REPO  = 'maenaka-sports-hp';
const BRANCH = 'main';
const NEWS_PATH = 'news.json';
const IMG_DIR   = 'news-images';

// ---- トークン管理 ----
function getToken() { return localStorage.getItem('gh_token') || ''; }

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return alert('トークンを入力してください');
  localStorage.setItem('gh_token', t);
  document.getElementById('tokenSetup').style.display = 'none';
  showToast('✅ トークンを保存しました');
  init();
}

// ---- 初期化 ----
function init() {
  // URLハッシュにトークンがあればlocalStorageに保存（スマホブックマーク用）
  const tkMatch = location.hash.match(/[#&]tk=([^&]+)/);
  if (tkMatch) {
    localStorage.setItem('gh_token', decodeURIComponent(tkMatch[1]));
    history.replaceState(null, '', location.pathname); // ハッシュを消す
  }
  // 今日の日付
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  if (getToken()) {
    document.getElementById('tokenSetup').style.display = 'none';
  }
  loadNewsList();
}

// ---- 画像選択 ----
let selectedImageFile = null;
let selectedImageDataUrl = null;

function handleImageSelect(input) {
  const file = input.files[0];
  if (!file) return;
  selectedImageFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    selectedImageDataUrl = e.target.result;
    document.getElementById('imgPreviewEl').src = selectedImageDataUrl;
    document.getElementById('imgPreview').classList.add('show');
    document.getElementById('imgRemove').style.display = 'block';
    document.getElementById('uploadZone').querySelector('.upload-text').innerHTML =
      '<strong>' + file.name + '</strong> を選択中';
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  selectedImageFile = null;
  selectedImageDataUrl = null;
  document.getElementById('f-image').value = '';
  document.getElementById('imgPreview').classList.remove('show');
  document.getElementById('imgRemove').style.display = 'none';
  document.getElementById('uploadZone').querySelector('.upload-text').innerHTML =
    'クリックまたはドラッグ＆ドロップで写真を選ぶ<br><strong>JPG・PNG・WebP 対応</strong>';
}

// ---- GitHub API ----
async function ghFetch(path, method = 'GET', body = null) {
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    method,
    headers: {
      'Authorization': `token ${getToken()}`,
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || res.statusText);
  }
  return res.json();
}

async function getFileSHA(path) {
  const data = await ghFetch(path);
  const raw = atob(data.content.replace(/\n/g,''));
  const text = decodeURIComponent(escape(raw));
  return { sha: data.sha, content: JSON.parse(text) };
}

function compressImage(dataUrl, maxPx, quality) {
  maxPx = maxPx || 1200; quality = quality || 0.82;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else        { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.src = dataUrl;
  });
}

async function uploadImage(file) {
  const safeName = Date.now() + '.jpg';
  const path = `${IMG_DIR}/${safeName}`;
  const base64 = await compressImage(selectedImageDataUrl);
  await ghFetch(path, 'PUT', {
    message: `お知らせ画像追加: ${safeName}`,
    content: base64,
    branch: BRANCH,
  });
  return `${IMG_DIR}/${safeName}`;
}

// ---- 公開 ----
async function publish() {
  const date     = document.getElementById('f-date').value;
  const category = document.getElementById('f-category').value;
  const title    = document.getElementById('f-title').value.trim();
  const body     = document.getElementById('f-body').value.trim();

  if (!date || !title || !body) {
    showToast('⚠️ 日付・タイトル・本文は必須です', true); return;
  }
  if (!getToken()) {
    showToast('⚠️ 先にトークンを設定してください', true); return;
  }

  setLoading(true, '公開中...');

  try {
    // 画像アップロード
    let imageName = '';
    if (selectedImageFile) {
      setLoading(true, '写真をアップロード中...');
      imageName = await uploadImage(selectedImageFile);
    }

    // news.json 取得
    setLoading(true, 'お知らせを更新中...');
    const { sha, content } = await getFileSHA(NEWS_PATH);

    // 新記事を先頭に追加
    const id = date + '-' + Math.random().toString(36).slice(2,7);
    const newItem = { id, date, category, title, image: imageName, body };
    content.items.unshift(newItem);

    // news.json を更新
    const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
    await ghFetch(NEWS_PATH, 'PUT', {
      message: `お知らせ追加: ${title}`,
      content: newContent,
      sha,
      branch: BRANCH,
    });

    setLoading(false);
    showToast('✅ 公開しました！数分後にサイトに反映されます');

    // フォームリセット
    document.getElementById('f-title').value = '';
    document.getElementById('f-body').value = '';
    removeImage();
    document.getElementById('f-date').value = new Date().toISOString().slice(0,10);

    // 一覧更新
    await loadNewsList();

  } catch (e) {
    setLoading(false);
    showToast('❌ エラー: ' + e.message, true);
    console.error(e);
  }
}

// ---- 一覧読み込み ----
async function loadNewsList() {
  const listEl = document.getElementById('newsList');
  if (!getToken()) {
    listEl.innerHTML = '<div style="font-size:0.8rem;color:#aaa;text-align:center;padding:16px;">トークンを設定すると表示されます</div>';
    return;
  }
  try {
    const { content } = await getFileSHA(NEWS_PATH);
    const items = content.items || [];
    if (items.length === 0) {
      listEl.innerHTML = '<div style="font-size:0.8rem;color:#aaa;text-align:center;padding:16px;">まだお知らせがありません</div>';
      return;
    }
    listEl.innerHTML = items.map(item => `
      <div class="news-item">
        <div class="news-item-img">
          ${item.image
            ? `<img src="https://maenakatsutomu-hash.github.io/maenaka-sports-hp/${item.image}" alt="">`
            : '📰'}
        </div>
        <div class="news-item-body">
          <div class="news-item-title">${item.title}</div>
          <div class="news-item-meta">${item.date} · ${item.category}</div>
        </div>
        <div class="news-item-del" onclick="deleteNews('${item.id}')">削除</div>
      </div>
    `).join('');
  } catch (e) {
    listEl.innerHTML = '<div style="font-size:0.8rem;color:#c0392b;padding:12px;">読み込みエラー: ' + e.message + '</div>';
  }
}

// ---- 削除 ----
async function deleteNews(id) {
  if (!confirm('このお知らせを削除しますか？')) return;
  setLoading(true, '削除中...');
  try {
    const { sha, content } = await getFileSHA(NEWS_PATH);
    content.items = content.items.filter(i => i.id !== id);
    const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
    await ghFetch(NEWS_PATH, 'PUT', {
      message: `お知らせ削除: ${id}`,
      content: newContent,
      sha,
      branch: BRANCH,
    });
    setLoading(false);
    showToast('🗑️ 削除しました');
    await loadNewsList();
  } catch (e) {
    setLoading(false);
    showToast('❌ ' + e.message, true);
  }
}

// ---- UI ヘルパー ----
function setLoading(on, msg = '') {
  document.getElementById('loadingOverlay').classList.toggle('show', on);
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('publishBtn').disabled = on;
  document.getElementById('spinner').classList.toggle('show', on);
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3500);
}

// ドラッグ＆ドロップ
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer(); dt.items.add(file);
    document.getElementById('f-image').files = dt.files;
    handleImageSelect(document.getElementById('f-image'));
  }
});

init();
</script>
</body>
</html>
